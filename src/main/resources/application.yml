server:
  port: 8080

spring:
  application:
    name: travel-cloud-map
  datasource:
    url: jdbc:h2:file:./data/zhuly;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 120MB

travel:
  map:
    provider: baidu
    enabled: ${BAIDU_MAP_ENABLED:false}
    api-key: ${BAIDU_MAP_API_KEY:}
  weather:
    provider: baidu
    api-key: ${BAIDU_WEATHER_API_KEY:}
  ai:
    provider: bailian
    enabled: true
    api-key: ${DASHSCOPE_API_KEY:${BAILIAN_API_KEY:}}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    model: qwen-plus
    vision-model: qwen-vl-plus
    timeout-seconds: 20
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:admin123}
  user:
    username: ${APP_DEMO_USERNAME:demo}
    password: ${APP_DEMO_PASSWORD:demo123}
