server:
  port: 8080

spring:
  application:
    name: travel-cloud-map
  datasource:
    url: jdbc:h2:mem:zhuly;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

travel:
  map:
    provider: baidu
    api-key: kv4jx5DP6hyZadzwhBSfbTfy0PdZ6RIv
  tts:
    provider: mock
    cache-prefix: /audio/mock/
  admin:
    username: admin
    password: admin123
  user:
    username: demo
    password: demo123
