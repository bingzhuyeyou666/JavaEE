server:
  port: 8080

spring:
  application:
    name: travel-cloud-map
  datasource:
    url: jdbc:h2:file:./data/zhuly;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  thymeleaf:
    cache: false
    check-template-location: false
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 120MB

travel:
  map:
    provider: baidu
    enabled: true
    api-key: kv4jx5DP6hyZadzwhBSfbTfy0PdZ6RIv
  weather:
    provider: baidu
    api-key: cQlQJ1UjBOWPN55NhemaQAwglQP0xAyl
  tts:
    provider: mock
    cache-prefix: /audio/mock/
  ai:
    provider: bailian
    enabled: true
    api-key: ${DASHSCOPE_API_KEY:${BAILIAN_API_KEY:}}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    model: qwen-plus
    vision-model: qwen-vl-plus
    timeout-seconds: 20
  admin:
    username: admin
    password: admin123
  user:
    username: demo
    password: demo123
