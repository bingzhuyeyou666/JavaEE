<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 旅图云</title>
    <link rel="stylesheet" href="/css/app.css?v=20260517-guide-page">
</head>
<body>
<header class="site-header compact">
    <div class="brand-row">
        <a class="brand portal-brand" href="/">
            <span class="brand-mark">旅</span>
            <span><strong>旅图云</strong><small>Travel Cloud Map</small></span>
        </a>
        <div class="header-right">
            <div class="brand-slogan">管理员身份验证后进入运营后台</div>
            <div class="account-entry" data-account-bar>
                <span class="account-avatar" data-account-avatar>游</span>
                <span><strong data-account-name>游客模式</strong><small data-account-hint>免登录浏览景点</small></span>
                <a class="account-action" data-account-action href="/login">登录</a>
            </div>
        </div>
    </div>
    <nav class="portal-nav">
        <a href="/">首页</a>
        <a href="/guide">景点导览</a>
        <a href="/route">线路规划</a>
        <a href="/me">个人中心</a>
        <a href="/submit-spot">景点申报</a>
    </nav>
</header>

<main class="container admin-login-page">
    <section class="admin-login-card">
        <div>
            <span class="eyebrow">ADMIN LOGIN</span>
            <h1>管理员登录</h1>
            <p class="muted">请输入管理员账号后继续管理景点、设施、评论与审核流程。</p>
        </div>
        <form class="admin-login-form" onsubmit="adminLogin(event)">
            <label>
                <span>账号</span>
                <input id="adminUsername" type="text" autocomplete="username" value="admin" required>
            </label>
            <label>
                <span>密码</span>
                <input id="adminPassword" type="password" autocomplete="current-password" required>
            </label>
            <button type="submit">登录后台</button>
            <p id="adminLoginMessage" class="form-message"></p>
        </form>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
